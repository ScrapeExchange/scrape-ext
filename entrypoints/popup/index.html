<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Scrape.Exchange</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: #000000;
        color: #e5e5e5;
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
        font-size: 13px;
        width: 360px;
        max-height: 480px;
        overflow-y: auto;
      }
      header {
        padding: 14px 16px;
        background: #000000;
        border-bottom: 1px solid #1a1a1a;
        font-family: 'Oswald', 'Barlow Condensed', system-ui, sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #ffffff;
      }
      header .count { color: #ffcc00; }
      ul { list-style: none; margin: 0; padding: 0; }
      li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 16px;
        border-bottom: 1px solid #1a1a1a;
      }
      li:last-child { border-bottom: none; }
      .id {
        font-family: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
        font-size: 12px;
        word-break: break-all;
        color: #e5e5e5;
      }
      .ts {
        color: #888888;
        font-size: 11px;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .chip {
        display: inline-block;
        padding: 2px 8px;
        margin-left: 6px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: 1px solid currentColor;
        background: transparent;
      }
      .chip-accepted,
      .chip-duplicate { color: #4ade80; }
      .chip-queued    { color: #888888; }
      .chip-retrying  { color: #ffcc00; }
      .chip-failed    { color: #f87171; }
      .empty {
        padding: 32px 16px;
        text-align: center;
        color: #888888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 12px;
      }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #1a1a1a; }
      ::-webkit-scrollbar-thumb { background: #888888; }
      ::-webkit-scrollbar-thumb:hover { background: #e5e5e5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
